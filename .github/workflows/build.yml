name: Build Flex Yemen

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create fresh Flutter project
        run: |
          # إنشاء مشروع Flutter جديد في مجلد مؤقت
          mkdir -p /tmp/fresh_project
          cd /tmp/fresh_project
          flutter create --org com.flexyemen --project-name flexy .
          # نسخ ملفات المشروع الأصلي إلى المشروع الجديد (مع تجاوز الملفات الموجودة)
          cp -r ${{ github.workspace }}/lib /tmp/fresh_project/
          cp -r ${{ github.workspace }}/assets /tmp/fresh_project/ 2>/dev/null || true
          cp ${{ github.workspace }}/pubspec.yaml /tmp/fresh_project/
          # استبدال المشروع الحالي بالمشروع الجديد
          rm -rf ${{ github.workspace }}/android ${{ github.workspace }}/ios
          cp -r /tmp/fresh_project/android ${{ github.workspace }}/
          cp -r /tmp/fresh_project/ios ${{ github.workspace }}/ 2>/dev/null || true
          cp /tmp/fresh_project/pubspec.yaml ${{ github.workspace }}/  # تأكد من عدم تغيير المحتوى
          cd ${{ github.workspace }}
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-app
          path: build/app/outputs/flutter-apk/app-release.apk
