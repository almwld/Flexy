workflows:
  flexy-full-build:
    name: Flexy Full App Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      groups:
        - supabase_keys
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: full-ui-build
          include: true
          source: true
    scripts:
      - name: Clean project
        script: |
          flutter clean
      
      - name: Get packages
        script: |
          flutter pub get
      
      - name: Build Android APK
        script: |
          flutter build apk --release --split-per-abi
      
      - name: Build Android AppBundle
        script: |
          flutter build appbundle --release
    
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - flutter_drive.log
    
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
