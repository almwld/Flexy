name: flex_yemen
description: FLEX YEMEN - المنصة الأولى للتجارة الإلكترونية في اليمن
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  curved_navigation_bar: ^1.0.3
  carousel_slider: ^4.2.1
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  
  # State Management
  provider: ^6.1.1
  
  # Backend
  supabase_flutter: ^2.0.0
  
  # Utilities
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/svg/
    - assets/animations/
